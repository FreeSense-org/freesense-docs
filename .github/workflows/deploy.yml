name: Deploy docs to Cloudflare Pages

# Builds the Starlight docs and deploys to the Cloudflare Pages project "freesense-docs"
# (docs.freesense.org) on every push to main. Manual runs allowed too.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docs-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=freesense-docs --branch=main
