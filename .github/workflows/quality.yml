name: Documentation quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: FreeSense-org/freesense
          path: freesense-src
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate -- freesense-src/src/etc/freesense-package-catalog.json
      - run: npm run build
      - name: Reject vendor documentation material
        run: |
          if git grep -IEn '(Netgate Docs|docs\.netgate\.com/pfsense|Electric Sheep Fencing|Rubicon Communications)' -- src public; then
            echo 'FreeSense documentation must not copy vendor documentation material' >&2
            exit 1
          fi
